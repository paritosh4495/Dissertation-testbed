version: '3.8'
name: "CSC8499-dissertation-testbed"

services:
  inventory-service:
    image: paritosh4495/csc8499-inventory-service
    container_name: inventory-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:postgresql://postgres-db:5432/inventory
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
    ports:
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 700m