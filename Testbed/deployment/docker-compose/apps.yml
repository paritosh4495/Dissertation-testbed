version: '3.8'
name: "CSC8499-dissertation-testbed"

services:
  inventory-service:
    image: paritosh4495/csc8499-inventory-service
    container_name: inventory-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:postgresql://postgres-db:5432/inventory
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - _JAVA_OPTIONS=-Xms512m -Xmx512m
    ports:
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 700m

  order-service:
    image: paritosh4495/csc8499-order-service
    container_name: order-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:postgresql://postgres-db:5432/orders
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - ORDER_INVENTORY_SERVICE_URL=http://inventory-service:8081
      - ORDER_PAYMENT_SERVICE_URL=http://payment-service:8083
      - _JAVA_OPTIONS=-Xms512m -Xmx512m
    ports:
      - "8082:8082"
    restart: unless-stopped
    depends_on:
      postgres-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 700m

  payment-service:
    image: paritosh4495/csc8499-payment-service
    container_name: payment-service
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - _JAVA_OPTIONS=-Xms512m -Xmx512m
    ports:
      - "8083:8083"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 700m
