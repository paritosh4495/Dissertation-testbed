name: Payment Service CI/CD Pipeline

# This workflow handles CI/CD for the Payment Service
on:
  push:
    branches:
      - main
    paths:
      - ../../Testbed/payment-service
  pull_request:
    branches:
      - main
    paths:
      - ../../Testbed/payment-service


jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./payment-service
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build with Maven
        run: |
          chmod +x ../mvnw
          ../mvnw -ntp verify 
  

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    defaults:
      run:
        working-directory: ./payment-service
    env:
      DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/csc8499-payment-service
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Docker Image
        run: |
          chmod +x ../mvnw
          ../mvnw -ntp spring-boot:build-image -DskipTests \
            -Dspring-boot.build-image.imageName=${{ env.DOCKER_IMAGE_NAME }}:latest
          docker push ${{ env.DOCKER_IMAGE_NAME }}:latest

